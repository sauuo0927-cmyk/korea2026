        function renderTabs() {
            const container = document.getElementById('tabs-container');
            container.innerHTML = '';
            days.forEach((day, index) => {
                const isActive = activeDay === index;
                const btn = document.createElement('button');
                btn.className = `snap-center flex-shrink-0 w-[100px] sm:w-[120px] py-2 sm:py-3 rounded-2xl font-bold transition-all duration-300 shadow-sm border-2 flex flex-col items-center justify-center cursor-pointer ${isActive ? 'bg-gradient-to-br from-rose-400 to-pink-500 text-white border-transparent scale-105 shadow-pink-300' : 'bg-white text-slate-500 border-rose-100 hover:bg-rose-50'}`;
                btn.onclick = () => { activeDay = index; renderTabs(); renderEvents(); };
                btn.innerHTML = `<span class="text-[10px] sm:text-xs opacity-90 mb-1">${day.date}</span><span class="text-base sm:text-lg tracking-wide">${day.title}</span>`;
                container.appendChild(btn);
            });
        }

        function renderEvents() {
            const dayData = days[activeDay];
            document.getElementById('highlight-text').innerText = `🌟 本日亮點：${dayData.highlight}`;
            
            const container = document.getElementById('events-container');
            container.innerHTML = dayData.events.map((event, idx) => `
                <div class="relative pl-5 sm:pl-10 group w-full">
                    <div class="absolute -left-[11px] sm:-left-[14px] top-1.5 sm:top-1 w-5 h-5 sm:w-6 sm:h-6 bg-rose-400 rounded-full border-[3px] sm:border-4 border-white shadow-md z-10"></div>
                    <div class="bg-white rounded-xl sm:rounded-2xl p-4 sm:p-5 shadow-sm border border-slate-100 hover:shadow-xl transition-all duration-300 w-full">
                        <div class="flex flex-wrap items-center gap-1.5 sm:gap-2 mb-2 sm:mb-3">
                            <span class="text-rose-600 font-black text-xs sm:text-sm bg-rose-50 px-2 sm:px-3 py-1 rounded-lg border border-rose-100">⏰ ${event.time}</span>
                            ${event.platform ? `<span class="text-[10px] sm:text-xs px-2 sm:px-3 py-1 rounded-lg font-bold shadow-sm ${event.platform.includes('許願') ? 'bg-pink-500 text-white' : 'bg-slate-100 text-slate-600'}">${event.platform}</span>` : ''}
                        </div>
                        <h3 class="text-base sm:text-xl font-bold mb-2 p-2 rounded-xl inline-block ${event.color || 'bg-slate-100'}">${event.title}</h3>
                        <p class="text-slate-600 leading-relaxed font-medium text-[13px] sm:text-[15px]">${event.desc.replace(/【(.*?)】/g, '<span class="font-black text-rose-600">【$1】</span>')}</p>
                        ${event.backup ? `<div class="mt-3 p-3 bg-slate-50 border-l-4 border-blue-400 rounded-r-xl"><p class="text-blue-700 font-bold text-[12px] sm:text-[14px]">${event.backup}</p></div>` : ''}
                        <img src="./images/day${activeDay + 1}_${idx + 1}.jpg" onerror="this.src='https://image.pollinations.ai/prompt/${encodeURIComponent(event.prompt)}?seed=2026${activeDay}${idx}'" class="mt-4 rounded-xl w-full aspect-video object-cover" />
                    </div>
                </div>
            `).join('');

            // 渲染底部導航
            const nav = document.getElementById('nav-container');
            nav.innerHTML = `
                ${activeDay > 0 ? `<button onclick="changeDay(-1)" class="flex-1 py-3 bg-white rounded-xl shadow border border-rose-200 text-rose-600 font-bold hover:bg-rose-50">⬅️ 前一日</button>` : '<div class="flex-1"></div>'}
                ${activeDay < days.length - 1 ? `<button onclick="changeDay(1)" class="flex-1 py-3 bg-white rounded-xl shadow border border-rose-200 text-rose-600 font-bold hover:bg-rose-50">次一日 ➡️</button>` : '<div class="flex-1"></div>'}
            `;
        }

        function changeDay(delta) {
            activeDay += delta;
            renderTabs();
            renderEvents();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        document.addEventListener('DOMContentLoaded', () => { renderTabs(); renderEvents(); });
    </script>
</body>
</html>
